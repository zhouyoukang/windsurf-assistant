<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>WAM · 无感切号</title>
<style>
:root{--bg:#0a0b10;--card:#111827;--border:#1f2937;--accent:#6366f1;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--cyan:#06b6d4;--text:#e2e8f0;--dim:#64748b;--row-hover:#1e293b;--orange:#f97316;--purple:#a78bfa}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.top{padding:12px 20px;background:linear-gradient(135deg,#0f1019,#111827);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.top h1{font-size:18px;font-weight:700;background:linear-gradient(90deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pool-val{font-size:16px;font-weight:700;letter-spacing:.5px}
.pool-val .d{color:var(--cyan)}.pool-val .w{color:#a78bfa}
.pool-val .label{font-size:11px;color:var(--dim);margin-left:4px}
.stats{display:flex;gap:8px;font-size:11px;color:var(--dim);align-items:center;flex-wrap:wrap}
.stats b{color:var(--text)}.stats .st-ok{color:var(--green)}.stats .st-ex{color:var(--red)}.stats .st-ur{color:var(--orange)}.stats .st-rl{color:var(--yellow)}
.active-bar{background:var(--card);border:1px solid var(--border);border-radius:8px;margin:10px 16px;padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.active-bar .tag{background:#312e81;color:#a78bfa;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600}
.active-bar .health{font-weight:700;font-size:15px}
.active-bar .chain{font-size:12px;color:var(--dim)}
.active-bar .score-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
.score-high{background:rgba(34,197,94,.15);color:var(--green)}
.score-mid{background:rgba(234,179,8,.12);color:var(--yellow)}
.score-low{background:rgba(239,68,68,.12);color:var(--red)}
.actions{display:flex;gap:6px;margin-left:auto}
.btn{padding:5px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#4f46e5}
.btn-green{background:#065f46;color:#34d399}.btn-green:hover{background:#047857}
.btn-danger{background:#7f1d1d;color:#fca5a5}.btn-danger:hover{background:#991b1b}
.btn-auto{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;animation:pulse-btn 2s infinite}
@keyframes pulse-btn{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,.4)}50%{box-shadow:0 0 0 6px rgba(99,102,241,0)}}
.btn-ghost{background:transparent;color:var(--dim);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text);border-color:var(--accent)}
.status-bar{display:flex;gap:6px;padding:6px 16px;flex-wrap:wrap;align-items:center}
.status-pill{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;display:inline-flex;align-items:center;gap:3px}
.sp-available{background:rgba(34,197,94,.12);color:var(--green)}
.sp-exhausted{background:rgba(239,68,68,.12);color:var(--red)}
.sp-urgent{background:rgba(249,115,22,.12);color:var(--orange)}
.sp-expiring{background:rgba(234,179,8,.12);color:var(--yellow)}
.sp-stale{background:rgba(100,116,139,.12);color:var(--dim)}
.sp-rate_limited{background:rgba(239,68,68,.15);color:#fca5a5}
.list{margin:0 16px 16px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.list-header{display:grid;grid-template-columns:32px 1fr 56px 56px 56px 64px 36px;padding:6px 12px;background:#0f1219;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);gap:4px}
.row{display:grid;grid-template-columns:32px 1fr 56px 56px 56px 64px 36px;padding:6px 12px;border-bottom:1px solid #151c28;align-items:center;transition:background .15s;gap:4px}
.row:hover{background:var(--row-hover)}
.row.active{background:#1e1b4b;border-left:3px solid var(--accent)}
.row.exhausted{opacity:.45}
.row.urgent{border-left:3px solid var(--orange)}
.row .idx{font-size:11px;color:var(--dim);font-weight:600;text-align:right}
.row .email-cell{display:flex;align-items:center;gap:6px;overflow:hidden}
.row .email{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.row .status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-available{background:var(--green)}.dot-exhausted{background:var(--red)}.dot-urgent{background:var(--orange)}
.dot-expiring{background:var(--yellow)}.dot-low{background:#fb923c}.dot-stale{background:var(--dim)}.dot-no_snapshot{background:#475569}
.row .d-val{font-size:11px;font-weight:700;color:var(--cyan);text-align:center}
.row .w-val{font-size:11px;font-weight:700;color:var(--purple);text-align:center}
.row .score-cell{text-align:center}
.row .score-num{font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;display:inline-block}
.row .plan-tag{font-size:9px;padding:1px 5px;border-radius:6px;background:#1e293b;color:var(--dim);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .acts{display:flex;gap:2px;justify-content:center}
.row .acts button{width:24px;height:24px;border-radius:5px;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.row .acts .sw-btn{background:#1e3a5f;color:#60a5fa}.row .acts .sw-btn:hover{background:#1d4ed8}
.toast{position:fixed;bottom:20px;right:20px;background:#1e293b;border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:360px}
.toast.show{opacity:1}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}
#refresh-ts{font-size:10px;color:var(--dim)}
.best-bar{background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(139,92,246,.08));border:1px solid rgba(99,102,241,.2);border-radius:8px;margin:0 16px 8px;padding:8px 14px;display:flex;align-items:center;gap:10px;font-size:12px}
.best-bar .label{color:var(--dim);font-size:11px}
.best-bar .candidate{color:var(--purple);font-weight:700}
.snap-status{font-size:10px;padding:4px 16px;color:var(--dim);display:flex;justify-content:space-between;align-items:center}
</style></head><body>

<div class="top">
  <h1>WAM · 智能切号 v5.0</h1>
  <div class="pool-val">
    <span class="d">D<span id="pool-d">0</span>%</span> ·
    <span class="w">W<span id="pool-w">0</span>%</span>
    <span class="label">号池总值</span>
  </div>
  <div class="stats">
    <span class="st-ok"><b id="s-avail">0</b>可用</span>
    <span><b id="s-total">0</b>总计</span>
    <span class="st-ex"><b id="s-exhausted">0</b>耗尽</span>
    <span class="st-rl"><b id="s-rate-limited">0</b>限流</span>
    <span class="st-ur"><b id="s-urgent">0</b>紧急</span>
    <span>切换<b id="s-switches">0</b>次</span>
    <span id="refresh-ts">…</span>
  </div>
</div>

<div class="active-bar">
  <span>活跃:</span>
  <span class="tag" id="active-tag">#? …</span>
  <span class="health" id="active-health">D?%·W?%</span>
  <span class="score-badge" id="active-score-badge"></span>
  <span class="chain" id="active-chain"></span>
  <div class="actions">
    <button class="btn btn-auto" onclick="doAutoSwitch()" title="智能检测+自动切换到最优账号">🧠 智能切号</button>
    <button class="btn btn-green" onclick="doHarvest()">📸 收割</button>
    <button class="btn btn-primary" onclick="doNext()">⚡ 下一个</button>
    <button class="btn btn-ghost" onclick="refreshAll()">🔄</button>
  </div>
</div>

<div class="best-bar" id="best-bar" style="display:none">
  <span class="label">🎯 最优候选:</span>
  <span class="candidate" id="best-candidate"></span>
  <span style="color:var(--dim);font-size:11px" id="best-detail"></span>
</div>

<div class="status-bar" id="status-bar"></div>

<div class="snap-status">
  <span>快照: <b id="snap-count">0</b>/<b id="snap-total">0</b> ●已收割 ○待收割</span>
  <span>排序: 智能评分↓ | 耗尽→末端</span>
</div>

<div class="list">
  <div class="list-header">
    <span>#</span><span>账号</span><span>D%</span><span>W%</span><span>评分</span><span>计划</span><span></span>
  </div>
  <div id="account-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let accounts = [];
let status = {};

function pctClass(v) { return v > 50 ? 'ok' : v > 20 ? 'warn' : 'low'; }
function scoreClass(s) { return s >= 500 ? 'score-high' : s >= 250 ? 'score-mid' : 'score-low'; }
function statusLabel(s) {
  const m = {available:'可用',low:'低额',urgent:'紧急',expiring:'将过期',exhausted:'耗尽',stale:'过期数据',no_snapshot:'无快照',rate_limited:'限流'};
  return m[s] || s;
}

function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

async function fetchJSON(url, opts) {
  try {
    const r = await fetch(API + url, opts);
    return await r.json();
  } catch(e) { return {error: e.message}; }
}

async function loadStatus() {
  status = await fetchJSON('/api/status');
  if (status.error) { toast('API offline: ' + status.error, 'err'); return; }
  document.getElementById('pool-d').textContent = status.pool_total_d || 0;
  document.getElementById('pool-w').textContent = status.pool_total_w || 0;
  document.getElementById('s-avail').textContent = status.available || 0;
  document.getElementById('s-total').textContent = status.count || 0;
  document.getElementById('s-exhausted').textContent = status.exhausted || 0;
  document.getElementById('s-rate-limited').textContent = status.rate_limited || 0;
  document.getElementById('s-urgent').textContent = status.urgent || 0;
  document.getElementById('s-switches').textContent = status.switches || 0;
  document.getElementById('snap-count').textContent = status.snapshots_count || 0;
  document.getElementById('snap-total').textContent = status.count || 0;

  const h = status.active_health || {};
  const ai = status.active_index;
  const ae = status.active_email || '?';
  const as = status.active_status || '';
  document.getElementById('active-tag').textContent =
    `#${ai >= 0 ? ai+1 : '?'} ${ae.substring(0, 20)} [${h.plan || '?'}]`;
  const lh = status.live_health || {};
  const ld = lh.daily != null ? lh.daily : (h.daily || '?');
  const lw = lh.weekly != null ? lh.weekly : (h.weekly || '?');
  document.getElementById('active-health').textContent = `D${ld}%·W${lw}%`;

  // Active score badge
  const aSc = status.active_score || 0;
  const aBadge = document.getElementById('active-score-badge');
  aBadge.textContent = `${aSc}分`;
  aBadge.className = 'score-badge ' + scoreClass(aSc);

  if (h.days_left) {
    document.getElementById('active-chain').textContent = `${h.days_left}d剩余`;
  }

  // Best candidate bar
  const bc = status.best_candidate;
  const bestBar = document.getElementById('best-bar');
  if (bc && bc.index > 0 && bc.email) {
    bestBar.style.display = 'flex';
    document.getElementById('best-candidate').textContent =
      `#${bc.index} ${bc.email.substring(0, 20)}`;
    document.getElementById('best-detail').textContent = `评分${bc.score}`;
  } else {
    bestBar.style.display = 'none';
  }

  // Status pills
  const sc = status.status_counts || {};
  const sb = document.getElementById('status-bar');
  let pills = '';
  if (sc.available) pills += `<span class="status-pill sp-available">✅ ${sc.available}可用</span>`;
  if (sc.low) pills += `<span class="status-pill sp-expiring">📉 ${sc.low}低额</span>`;
  if (sc.urgent) pills += `<span class="status-pill sp-urgent">⚠️ ${sc.urgent}紧急</span>`;
  if (sc.expiring) pills += `<span class="status-pill sp-expiring">⏳ ${sc.expiring}将过期</span>`;
  if (sc.exhausted) pills += `<span class="status-pill sp-exhausted">🔴 ${sc.exhausted}耗尽</span>`;
  if (sc.stale) pills += `<span class="status-pill sp-stale">❓ ${sc.stale}数据过期</span>`;
  if (sc.no_snapshot) pills += `<span class="status-pill sp-stale">📷 ${sc.no_snapshot}无快照</span>`;
  sb.innerHTML = pills;
}

async function loadAccounts() {
  accounts = await fetchJSON('/api/accounts');
  if (accounts.error) return;
  const list = document.getElementById('account-list');
  list.innerHTML = accounts.map(a => {
    const dc = pctClass(a.daily);
    const wc = pctClass(a.weekly);
    const active = a.is_active ? ' active' : '';
    const exhausted = a.status === 'exhausted' ? ' exhausted' : '';
    const urgent = a.status === 'urgent' ? ' urgent' : '';
    const snap = a.has_snapshot ? '●' : '○';
    const snapColor = a.has_snapshot ? 'var(--green)' : 'var(--dim)';
    const sc = scoreClass(a.score);
    const dColor = a.daily <= 5 ? 'var(--red)' : a.daily <= 20 ? 'var(--orange)' : 'var(--cyan)';
    const wColor = a.weekly <= 5 ? 'var(--red)' : a.weekly <= 20 ? 'var(--orange)' : 'var(--purple)';
    return `<div class="row${active}${exhausted}${urgent}">
      <span class="idx">${a.index}</span>
      <span class="email-cell">
        <span class="status-dot dot-${a.status}" title="${statusLabel(a.status)}"></span>
        <span class="email" title="${a.email}">${a.email.split('@')[0]}</span>
        <span style="color:${snapColor};font-size:11px" title="${a.has_snapshot ? '快照已收割' : '需收割'}">${snap}</span>
      </span>
      <span class="d-val" style="color:${dColor}">D${a.daily}%</span>
      <span class="w-val" style="color:${wColor}">W${a.weekly}%</span>
      <span class="score-cell"><span class="score-num ${sc}">${a.score}</span></span>
      <span class="plan-tag">${a.plan || 'Trial'} ${a.days_left ? a.days_left+'d' : ''}</span>
      <span class="acts">
        <button class="sw-btn" onclick="doSwitch('${a.email}')" title="切换到此账号">⚡</button>
      </span>
    </div>`;
  }).join('');
}

async function refreshAll() {
  await Promise.all([loadStatus(), loadAccounts()]);
  document.getElementById('refresh-ts').textContent =
    new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

async function doSwitch(email) {
  toast('切换中...', 'ok');
  const r = await fetchJSON('/api/switch', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email})
  });
  if (r.ok) {
    toast(`✅ 已切换 → ${r.target?.substring(0,20)} (${r.ms}ms)`, 'ok');
    setTimeout(refreshAll, 3000);
  } else {
    toast(`❌ ${r.error || r.steps?.join(' → ')}`, 'err');
  }
}

async function doNext() {
  toast('选择最优账号...', 'ok');
  const r = await fetchJSON('/api/next', {method: 'POST'});
  if (r.ok) {
    toast(`✅ → ${r.target?.substring(0,20)} (${r.ms}ms)`, 'ok');
    setTimeout(refreshAll, 3000);
  } else {
    toast(`❌ ${r.error || 'Failed'}`, 'err');
  }
}

async function doAutoSwitch() {
  toast('🧠 智能检测中...', 'ok');
  const r = await fetchJSON('/api/auto-switch', {method: 'POST'});
  if (r.action === 'hold') {
    toast(`✅ 当前账号健康，无需切换`, 'ok');
  } else if (r.action === 'auto_switched') {
    toast(`🔄 ${r.reason}`, 'ok');
    setTimeout(refreshAll, 3000);
  } else if (r.action === 'no_candidate') {
    toast(`⚠️ ${r.reason}`, 'err');
  } else {
    toast(`❌ ${r.reason || r.error || 'Failed'}`, 'err');
  }
  setTimeout(refreshAll, 1000);
}

async function doHarvest() {
  const r = await fetchJSON('/api/harvest', {method: 'POST'});
  if (r.ok) {
    toast(`✅ ${r.message}`, 'ok');
    refreshAll();
  } else {
    toast(`❌ ${r.message || 'Harvest failed'}`, 'err');
  }
}

refreshAll();
setInterval(refreshAll, 20000);
</script>
</body></html>
