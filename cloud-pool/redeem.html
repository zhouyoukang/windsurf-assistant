<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Windsurf 卡密兑换</title>
<style>
:root{--bg:#050608;--card:#111520;--border:#1a1f2e;--accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--red:#ef4444;--text:#e2e8f0;--dim:#64748b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.wrap{max-width:480px;width:90%;padding:20px}
h1{font-size:1.6rem;text-align:center;margin-bottom:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;color:var(--dim);font-size:.85rem;margin-bottom:28px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px}
label{display:block;color:var(--dim);font-size:.8rem;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
input{width:100%;padding:12px 16px;background:#0a0d14;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1.1rem;font-family:monospace;text-align:center;letter-spacing:2px;outline:none;transition:border .2s}
input:focus{border-color:var(--accent)}
input::placeholder{color:#334155;letter-spacing:1px}
.btn{width:100%;padding:14px;margin-top:16px;background:linear-gradient(135deg,var(--accent),#4f46e5);border:none;border-radius:8px;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s}
.btn:hover{opacity:.9}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.result{display:none;margin-top:20px}
.result.show{display:block}
.result.error .msg{color:var(--red)}
.result.success .msg{color:var(--green)}
.msg{font-size:.95rem;margin-bottom:16px;text-align:center;font-weight:500}
.cred{background:#0a0d14;border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
.cred-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1a1f2e}
.cred-row:last-child{border-bottom:none}
.cred-label{color:var(--dim);font-size:.75rem;text-transform:uppercase;min-width:70px}
.cred-value{font-family:monospace;font-size:.9rem;word-break:break-all;text-align:right;flex:1;margin-left:12px}
.copy-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--dim);font-size:.7rem;padding:2px 8px;margin-left:8px;cursor:pointer;white-space:nowrap}
.copy-btn:hover{color:var(--text);border-color:var(--accent)}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:600}
.tag-account{background:rgba(99,102,241,.15);color:var(--accent2)}
.tag-tool{background:rgba(34,197,94,.15);color:var(--green)}
.warn{color:var(--dim);font-size:.75rem;text-align:center;margin-top:16px;line-height:1.5}
.footer{text-align:center;color:#334155;font-size:.7rem;margin-top:32px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Windsurf 卡密兑换</h1>
  <p class="sub">输入购买的卡密，即刻获取账号</p>
  <div class="card">
    <label>兑换码</label>
    <input id="code" type="text" placeholder="WS-XXXX-XXXX-XXXX" maxlength="20" autocomplete="off" spellcheck="false"/>
    <button class="btn" id="submit" onclick="redeem()">立即兑换</button>
  </div>
  <div class="result" id="result">
    <div class="msg" id="msg"></div>
    <div class="cred" id="creds" style="display:none"></div>
  </div>
  <p class="warn">⚠ 每个卡密仅可使用一次，兑换后请立即保存账号信息<br/>账号为动态分配，系统自动选择最佳额度账号</p>
  <p class="footer">Powered by Cloud Pool v3.1 · 道法自然</p>
</div>
<script>
var API=location.origin;
function redeem(){
  var code=(document.getElementById('code').value||'').trim().toUpperCase();
  if(!code){alert('请输入卡密');return}
  var btn=document.getElementById('submit');
  var res=document.getElementById('result');
  var msg=document.getElementById('msg');
  var creds=document.getElementById('creds');
  btn.disabled=true;btn.textContent='兑换中...';
  res.className='result';res.style.display='none';creds.style.display='none';
  fetch(API+'/api/redeem',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code})})
  .then(function(r){return r.json()})
  .then(function(d){
    btn.disabled=false;btn.textContent='立即兑换';
    res.style.display='block';
    if(!d.ok){
      res.className='result show error';
      msg.textContent='❌ '+d.error;
      return;
    }
    res.className='result show success';
    if(d.type==='tool'){
      msg.innerHTML='✅ '+d.message;
      creds.style.display='block';
      creds.innerHTML='<div class="cred-row"><span class="cred-label">类型</span><span class="tag tag-tool">工具卡</span></div>'
        +'<div class="cred-row"><span class="cred-label">有效期</span><span class="cred-value">'+d.days+'天</span></div>'
        +'<div class="cred-row"><span class="cred-label">说明</span><span class="cred-value" style="font-size:.8rem">'+d.instructions+'</span></div>';
      return;
    }
    msg.innerHTML='✅ 账号分配成功！请立即保存';
    creds.style.display='block';
    var rows='<div class="cred-row"><span class="cred-label">类型</span><span class="tag tag-account">独享账号</span></div>';
    rows+='<div class="cred-row"><span class="cred-label">邮箱</span><span class="cred-value" id="v-email">'+d.email+'</span><button class="copy-btn" onclick="cp(\'v-email\')">复制</button></div>';
    if(d.password)rows+='<div class="cred-row"><span class="cred-label">密码</span><span class="cred-value" id="v-pwd">'+d.password+'</span><button class="copy-btn" onclick="cp(\'v-pwd\')">复制</button></div>';
    rows+='<div class="cred-row"><span class="cred-label">套餐</span><span class="cred-value">'+d.plan+'</span></div>';
    rows+='<div class="cred-row"><span class="cred-label">日额度</span><span class="cred-value">'+d.daily_pct+'%</span></div>';
    rows+='<div class="cred-row"><span class="cred-label">周额度</span><span class="cred-value">'+d.weekly_pct+'%</span></div>';
    rows+='<div class="cred-row"><span class="cred-label">剩余天数</span><span class="cred-value">'+d.days_left+'天</span></div>';
    if(d.auth_blob)rows+='<div class="cred-row"><span class="cred-label">热切换</span><span class="cred-value" style="color:var(--green)">✅ 含auth blob</span></div>';
    creds.innerHTML=rows;
  })
  .catch(function(e){
    btn.disabled=false;btn.textContent='立即兑换';
    res.className='result show error';res.style.display='block';
    msg.textContent='❌ 网络错误: '+e.message;
  });
}
function cp(id){
  var el=document.getElementById(id);
  if(!el)return;
  var t=el.textContent;
  if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){el.style.color='var(--green)';setTimeout(function(){el.style.color=''},800)})}
  else{var ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)}
}
document.getElementById('code').addEventListener('keydown',function(e){if(e.key==='Enter')redeem()});
document.getElementById('code').addEventListener('input',function(){
  var v=this.value.replace(/[^A-Za-z0-9-]/g,'').toUpperCase();
  if(v.length>2&&v[2]!=='-'&&!v.includes('-'))v=v.slice(0,2)+'-'+v.slice(2);
  this.value=v;
});
</script>
</body>
</html>
