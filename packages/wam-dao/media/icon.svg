<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <title>道·AGI 万法归宗</title>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#f5f2e9"/>
      <stop offset="100%" stop-color="#d9d2bc"/>
    </radialGradient>
    <filter id="ink">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- 纸面 -->
  <circle cx="64" cy="64" r="62" fill="url(#bg)" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- 太极 -->
  <g filter="url(#ink)">
    <path d="M64 12 a52 52 0 0 1 0 104 a26 26 0 0 1 0 -52 a26 26 0 0 0 0 -52 z"
          fill="#1a1a1a"/>
    <circle cx="64" cy="38" r="7" fill="#f5f2e9"/>
    <circle cx="64" cy="90" r="7" fill="#1a1a1a"/>
  </g>

  <!-- 外圈八卦位 (简化) -->
  <g stroke="#1a1a1a" stroke-width="1.1" fill="none" opacity="0.55">
    <line x1="64" y1="2"   x2="64" y2="10"/>
    <line x1="64" y1="118" x2="64" y2="126"/>
    <line x1="2"  y1="64"  x2="10" y2="64"/>
    <line x1="118" y1="64" x2="126" y2="64"/>
    <line x1="20"  y1="20"  x2="26"  y2="26"/>
    <line x1="108" y1="108" x2="102" y2="102"/>
    <line x1="108" y1="20"  x2="102" y2="26"/>
    <line x1="20"  y1="108" x2="26"  y2="102"/>
  </g>

  <!-- 道字 (中心,微透) -->
  <text x="64" y="72" font-size="22" text-anchor="middle"
        font-family="KaiTi, STKaiti, serif"
        fill="#b86b6b" opacity="0.0">道</text>
</svg>
